<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Portal Verification</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 380px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 12px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; }
        button:hover { background-color: #218838; }
        .hidden { display: none; }
        #recaptcha-container { margin: 15px 0; display: flex; justify-content: center; }
    </style>
</head>
<body>

<div class="container">
    <h2>Quiz Verification</h2>
    
    <!-- STEP 1: Input Phone Number -->
    <div id="phoneSection">
        <p>Enter your phone number in full international format to receive an access code.</p>
        <input type="tel" id="phoneNumber" placeholder="e.g., +2348012345678">
        <!-- Firebase reCAPTCHA security container -->
        <div id="recaptcha-container"></div>
        <button onclick="requestOTP()">Send Verification SMS</button>
    </div>

    <!-- STEP 2: Input OTP -->
    <div id="otpSection" class="hidden">
        <p>Enter the 6-digit code sent to your phone line.</p>
        <input type="number" id="otpCode" placeholder="X X X X X X">
        <button onclick="confirmOTP()">Verify Code & Enter</button>
    </div>
</div>

<!-- Firebase SDK Scripts (Using v9 Compat Mode) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>
    // Your exact Firebase setup from the screenshot!
    const firebaseConfig = {
        apiKey: "AIzaSyAKCuQZCi9s9SLVOXSHsWwx2clxDHYqt7w",
        authDomain: "freefire-quiz-arena.firebaseapp.com",
        projectId: "freefire-quiz-arena",
        storageBucket: "freefire-quiz-arena.firebasestorage.app",
        messagingSenderId: "1004447878604",
        appId: "1:1004447878604:web:6a54c282821699e8b1a169"
    };
    
    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Setup the automatic reCAPTCHA verification gate
    window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
        'size': 'invisible'
    });

    let confirmationResultGlobal = null;

    // Request the SMS code
    function requestOTP() {
        const phone = document.getElementById("phoneNumber").value.trim();
        const appVerifier = window.recaptchaVerifier;

        if(!phone.startsWith("+")) {
            alert("Please start your number with your country code (e.g. +234 for Nigeria)!");
            return;
        }

        auth.signInWithPhoneNumber(phone, appVerifier)
            .then((confirmationResult) => {
                confirmationResultGlobal = confirmationResult;
                // Switch the input forms smoothly
                document.getElementById("phoneSection").classList.add("hidden");
                document.getElementById("otpSection").classList.remove("hidden");
                alert("SMS verification code sent successfully!");
            }).catch((error) => {
                alert("Error sending SMS: " + error.message);
            });
    }

    // Check the OTP code the user inputs
    function confirmOTP() {
        const code = document.getElementById("otpCode").value.trim();

        confirmationResultGlobal.confirm(code)
            .then((result) => {
                alert("Access Granted!");
                // Store phone number locally so the quiz dashboard can display it
                localStorage.setItem("userPhone", result.user.phoneNumber);
                // Redirect user automatically to the quiz page dashboard
                window.location.href = "quiz.html";
            }).catch((error) => {
                alert("Invalid verification code. Try again.");
            });
    }
</script>

</body>
</html>
